# AQI Configuration - Global Settings

project:
  name: "Artificial Quranic Intelligence"
  short_name: "AQI"
  version: "0.2.0-dev"
  description: "AQI - AI that thinks with the paradigm of the Quran"
  bismillah: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ"

paths:
  data_root: "data"
  models_root: "models"
  logs_root: "logs"
  checkpoints_root: "checkpoints"

training:
  device: "auto"
  seed: 42
  num_workers: 4
  mixed_precision: true
  gradient_accumulation_steps: 1

quranic_principles:
  enable_mathematical_codes: true
  enable_scientific_references: true
  enable_hidden_patterns: true
  enable_literary_devices: true
  enable_ontological_hierarchy: true

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/aqi.log"
